<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scale for Grams - Digital Scale using your camera</title>
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="Scale for Grams - Digital Scale using your camera">
    <meta name="description" content="Transform your phone into a digital scale. Measure weight accurately using your camera.">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://andreidiaconu.com/scaleforgrams.html">
    <meta property="og:title" content="Scale for Grams - Digital Scale using your camera">
    <meta property="og:description" content="Transform your phone into a digital scale. Measure weight accurately using your camera.">
    <meta property="og:image" content="https://andreidiaconu.com/scaleforgrams-icon.png">
    <meta property="og:image:width" content="1024">
    <meta property="og:image:height" content="1024">
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://andreidiaconu.com/scaleforgrams.html">
    <meta name="twitter:title" content="Scale for Grams - Digital Scale using your camera">
    <meta name="twitter:description" content="Transform your phone into a digital scale. Measure weight accurately using your camera.">
    <meta name="twitter:image" content="https://andreidiaconu.com/scaleforgrams-icon.png">
    
    <!-- App Links -->
    <meta property="al:ios:app_store_id" content="6759266708">
    <meta property="al:ios:app_name" content="Scale for Grams">
    <meta property="al:android:package" content="com.andreidiaconu.scaleforgrams">
    <meta property="al:android:app_name" content="Scale for Grams">
    
    <!-- Smart App Banner for iOS Safari -->
    <meta name="apple-itunes-app" content="app-id=6759266708">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #e8f4fc 0%, #d0e8f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
        }
        .app-icon {
            width: 150px;
            height: 150px;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            margin-bottom: 24px;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 32px;
        }
        .redirecting {
            font-size: 14px;
            color: #888;
            margin-bottom: 24px;
            display: none;
        }
        .redirecting.show {
            display: block;
        }
        .store-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }
        .store-button {
            display: block;
            transition: transform 0.2s, opacity 0.2s;
        }
        .store-button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .store-button:active {
            transform: translateY(0);
        }
        .store-button img {
            height: auto;
            width: 200px;
        }
        .store-button img[alt*="Google Play"] {
            width: 225px;
            margin: -12px 0;
        }
        @media (prefers-color-scheme: dark) {
            html, body {
                background: linear-gradient(180deg, #1a2a35 0%, #0f1a22 100%);
            }
            h1 {
                color: #fff;
            }
            .subtitle {
                color: #aaa;
            }
        }
    </style>
    
    <script>
        (function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            var appStoreUrl = 'https://apps.apple.com/app/id6759266708';
            var playStoreUrl = 'https://play.google.com/store/apps/details?id=com.andreidiaconu.scaleforgrams';
            
            // Detect iOS
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                document.addEventListener('DOMContentLoaded', function() {
                    var redirectMsg = document.querySelector('.redirecting');
                    if (redirectMsg) {
                        redirectMsg.textContent = 'Redirecting to App Store...';
                        redirectMsg.classList.add('show');
                    }
                });
                setTimeout(function() {
                    window.location.href = appStoreUrl;
                }, 1000);
            }
            // Detect Android
            else if (/android/i.test(userAgent)) {
                document.addEventListener('DOMContentLoaded', function() {
                    var redirectMsg = document.querySelector('.redirecting');
                    if (redirectMsg) {
                        redirectMsg.textContent = 'Redirecting to Play Store...';
                        redirectMsg.classList.add('show');
                    }
                });
                setTimeout(function() {
                    window.location.href = playStoreUrl;
                }, 1000);
            }
        })();
    </script>
</head>
<body>
    <div class="container">
        <img src="scaleforgrams-icon.png" alt="Scale for Grams App Icon" class="app-icon">
        <h1>Scale for Grams</h1>
        <p class="subtitle">Digital Scale using your camera</p>
        
        <p class="redirecting"></p>
        
        <div class="store-buttons">
            <a href="https://apps.apple.com/app/id6759266708" class="store-button">
                <img src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=250x83" alt="Download on the App Store">
            </a>
            
            <a href="https://play.google.com/store/apps/details?id=com.andreidiaconu.scaleforgrams" class="store-button">
                <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play">
            </a>
        </div>
    </div>
</body>
</html>
